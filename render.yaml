services:
  - type: web
    name: sipus-sby-web
    env: docker
    plan: free
    region: singapore
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: "Sistem Informasi Perpustakaan"
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: sipus-sby-db
          property: connectionString

databases:
  - name: sipus-sby-db
    plan: free
    region: singapore
    databaseName: sipus_db
    user: sipus_user
